<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Graceb - 프리미엄 화장품 제조의 새로운 기준. Creating Beauty, Delivering Trust."
    />
    <meta
      name="keywords"
      content="Graceb, 화장품 제조, OEM, ODM, Bellement, 코스메틱"
    />
    <title>Graceb - Creating Beauty, Delivering Trust</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Graceb - Creating Beauty, Delivering Trust"
    />
    <meta
      property="og:description"
      content="프리미엄 화장품 제조의 새로운 기준을 만듭니다."
    />
    <meta property="og:image" content="https://graceb-web.vercel.app/images/logo/OG_tag.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://graceb-web.vercel.app" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/logo/favicon-96x96.png"
    />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/xlc0hdn.css" />

    <!-- Swiper.js -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- AOS.js -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css?v=20260112b" />
  </head>
  <body>
    <!-- 헤더 플레이스홀더 (components.js가 로드) -->
    <div id="header-placeholder"></div>

    <!-- ========== HERO SECTION ========== -->
    <section class="hero" id="hero">
      <!-- 배경 동영상 슬라이더 -->
      <div class="hero__slider">
        <div class="hero__slide hero__slide--active" data-title="Cosmetics Manufacturing,<br />Centered on Fragrance" data-description="향을 중심으로 설계하는 코스메틱 제조">
          <video src="https://graceb-web.vercel.app/videos/hero/video_1.mp4" autoplay muted playsinline></video>
        </div>
        <div class="hero__slide" data-title="Where Nature and Science<br />Are Precisely Balanced" data-description="자연과 과학의 균형으로 완성되는 제조">
          <video src="https://graceb-web.vercel.app/videos/hero/video_2.mp4" muted playsinline></video>
        </div>
        <div class="hero__slide" data-title="Precision in Every Step<br />of Manufacturing" data-description="공정 하나까지 완성도를 기준으로">
          <video src="https://graceb-web.vercel.app/videos/hero/video_3.mp4" muted playsinline></video>
        </div>
      </div>
      <div class="hero__overlay"></div>

      <!-- 좌우 이동 버튼 -->
      <button class="hero__nav hero__nav--prev" aria-label="이전 영상">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <button class="hero__nav hero__nav--next" aria-label="다음 영상">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 5l7 7-7 7"/>
        </svg>
      </button>

      <div class="hero__content">
        <img src="/images/logo/Grace_B_W.png" alt="Graceb" class="hero__logo" />
        <h1 class="hero__title">Cosmetics Manufacturing,<br />Centered on Fragrance</h1>
        <p class="hero__description">
          향을 중심으로 설계하는 코스메틱 제조
        </p>
        <a href="/pages/about.html" class="hero__cta">더 알아보기</a>
      </div>

      <!-- Scroll Down Indicator -->
      <div class="hero__scroll-indicator">
        <div class="hero__scroll-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </div>
    </section>

    <!-- ========== CONTACT SECTION ========== -->
    <section class="contact section" id="contact">
      <div class="container">
        <div class="section__header" data-aos="fade-up">
          <span class="section__subtitle">Contact Us</span>
          <h2 class="section__title">문의하기</h2>
        </div>

        <div class="contact__content">
          <div class="contact__info" data-aos="fade-right">
            <div class="contact__item">
              <div class="contact__icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
                  />
                  <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
              </div>
              <div class="contact__details">
                <h4>주소</h4>
                <p>경기도 수원시 권선구 308-18<br />지원상가동 지하층 10호<br />(고색동, 수원종합공구단지)</p>
              </div>
            </div>

            <div class="contact__item">
              <div class="contact__icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                  />
                </svg>
              </div>
              <div class="contact__details">
                <h4>전화</h4>
                <p>031-3081-6499</p>
              </div>
            </div>

            <div class="contact__item">
              <div class="contact__icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                  />
                </svg>
              </div>
              <div class="contact__details">
                <h4>이메일</h4>
                <p>graceb1119@naver.com</p>
              </div>
            </div>

            <div class="contact__item">
              <div class="contact__icon">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>
              <div class="contact__details">
                <h4>업무 시간</h4>
                <p>AM 09:00 ~ PM 18:00<br />SAT, SUN, HOLIDAY CLOSED</p>
              </div>
            </div>
          </div>

          <div class="contact__map" data-aos="fade-left">
            <!-- Google Maps: 경기도 수원시 권선구 고색동 986 지원상가동 -->
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d793.9323943979635!2d126.98474026959771!3d37.254123065721394!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMzfCsDE1JzE0LjgiTiAxMjbCsDU5JzA3LjQiRQ!5e0!3m2!1sko!2skr!4v1767441474450!5m2!1sko!2skr"
              width="100%"
              height="100%"
              style="border:0; min-height: 400px;"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>
      </div>
    </section>

    <!-- 푸터 플레이스홀더 (components.js가 로드) -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js?v=20260112b"></script>
  </body>
</html>
