<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bellement - Graceb의 대표 브랜드. A Perfumer's Touch, Your Signature Scent."
    />
    <meta
      name="keywords"
      content="Graceb, Bellement, 벨망, 향수, 프리미엄 스킨케어"
    />
    <title>Brand - Graceb</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Brand - Graceb" />
    <meta
      property="og:description"
      content="Bellement - A Perfumer's Touch, Your Signature Scent."
    />
    <meta property="og:image" content="https://graceb-web.vercel.app/images/logo/OG_tag.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://graceb-web.vercel.app/pages/brand.html" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/logo/favicon-96x96.png"
    />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/xlc0hdn.css" />

    <!-- Swiper.js -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- AOS.js -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css?v=20260112b" />
  </head>
  <body class="page-body">
    <!-- 헤더 플레이스홀더 (components.js가 로드) -->
    <div id="header-placeholder"></div>

    <!-- ========== PAGE HERO ========== -->
    <section class="page-hero page-hero--simple">
      <div class="page-hero__background">
        <img src="/images/제품소개/제조 가능 품목 사진들/제작 가능 헤더.png" alt="Brand" />
        <div class="page-hero__overlay"></div>
      </div>
      <div class="container">
        <div class="page-hero__content">
          <span class="page-hero__subtitle">Our Brand</span>
          <h1 class="page-hero__title">
            <img
              src="/images/logo/blogo.png"
              alt="Bellement"
              class="page-hero__title-logo"
            />
          </h1>
        </div>
      </div>
    </section>

    <!-- ========== BRAND CONTENT ========== -->
    <section class="page-section page-section--gray">
      <div class="container">
        <div class="section__header" data-aos="fade-up">
          <span class="section__subtitle">Our Brand</span>
          <h2 class="section__title section__title--brand">
            <img
              src="/images/logo/blogo.png"
              alt="Bellement"
              class="brand__title-logo"
            />
          </h2>
        </div>

        <div class="brand__content">
          <div class="brand__info" data-aos="fade-up">
            <div class="brand__logo">
              <img
                src="/images/logo/bellement_logo.png"
                alt="Bellement"
                class="brand__logo-img"
              />
            </div>
            <p class="brand__slogan">
              "A Perfumer's Touch, Your Signature Scent."
            </p>
            <p class="brand__description">
              Bellement은 Graceb의 대표 브랜드로, 자연에서 영감을 받은 프리미엄
              스킨케어 라인을 선보입니다. 과학과 자연의 조화로운 결합으로 모든
              순간을 아름답게 만들어 드립니다.
            </p>
            <a
              href="https://www.bellement.kr/"
              target="_blank"
              rel="noopener noreferrer"
              class="btn btn--primary"
              >브랜드 사이트 바로가기</a
            >
          </div>

          <!-- Product Slider -->
          <div class="brand__slider" data-aos="fade-up" data-aos-delay="100">
            <div class="swiper brand-swiper">
              <div class="swiper-wrapper">
                <div class="swiper-slide">
                  <div class="product-card">
                    <img src="/images/brand/1.png" alt="Bellement 제품 1" />
                  </div>
                </div>
                <div class="swiper-slide">
                  <div class="product-card">
                    <img src="/images/brand/2.png" alt="Bellement 제품 2" />
                  </div>
                </div>
                <div class="swiper-slide">
                  <div class="product-card">
                    <img src="/images/brand/3.png" alt="Bellement 제품 3" />
                  </div>
                </div>
                <div class="swiper-slide">
                  <div class="product-card">
                    <img src="/images/brand/4.png" alt="Bellement 제품 4" />
                  </div>
                </div>
              </div>
              <div class="swiper-pagination"></div>
              <div class="swiper-button-prev"></div>
              <div class="swiper-button-next"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 푸터 플레이스홀더 (components.js가 로드) -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js?v=20260112b"></script>
  </body>
</html>
