<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bellement - Graceb의 대표 브랜드. A Perfumer's Touch, Your Signature Scent."
    />
    <meta
      name="keywords"
      content="Graceb, Bellement, 벨망, 향수, 프리미엄 스킨케어"
    />
    <title>Brand - Graceb</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Brand - Graceb" />
    <meta
      property="og:description"
      content="Bellement - A Perfumer's Touch, Your Signature Scent."
    />
    <meta property="og:image" content="https://graceb-web.vercel.app/images/logo/OG_tag.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://graceb-web.vercel.app/pages/brand.html" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/logo/favicon-96x96.png"
    />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/xlc0hdn.css" />

    <!-- Swiper.js -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- AOS.js -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css?v=20260116" />
  </head>
  <body class="page-body">
    <!-- 헤더 플레이스홀더 (components.js가 로드) -->
    <div id="header-placeholder"></div>

    <!-- ========== PAGE HERO ========== -->
    <section class="page-hero page-hero--simple">
      <div class="page-hero__background">
        <img src="/images/제품소개/제조 가능 품목 사진들/제작 가능 헤더.png" alt="Brand" />
        <div class="page-hero__overlay"></div>
      </div>
      <div class="container">
        <div class="page-hero__content">
          <span class="page-hero__subtitle">Our Brand</span>
          <h1 class="page-hero__title">브랜드 소개</h1>
          <p class="page-hero__description">그레이스비가 직접 기획·개발·운영하는 자체 브랜드를 소개합니다.<br>제조 경험을 바탕으로 완성도와 방향성을 함께 담아낸 브랜드 라인업입니다.</p>
        </div>
      </div>
    </section>

    <!-- ========== BRAND CONTENT ========== -->
    <section class="page-section page-section--gray brand-section">
      <div class="brand__wrapper">
        <!-- 브랜드 이미지들 - 왼쪽에서 슬라이더와 겹침 -->
        <div class="brand__left">
          <img src="/images/brand/Our Brand-01.png" alt="Our Brand" class="brand-left__image" />
          <img src="/images/brand/벨망 글 로고-01.png" alt="Bellement Logo" class="brand-left__logo" />
          <p class="brand-left__description">
            Bellement은 Graceb의 대표 브랜드로,<br>
            자연에서 영감을 받은 프리미엄 스킨케어 라인을 선보입니다.<br>
            과학과 자연의 조화로운 결합으로 모든 순간을 아름답게 만들어 드립니다.
          </p>
          <a href="https://www.bellement.kr/" target="_blank" rel="noopener noreferrer">
            <img src="/images/brand/가이드 라인-01.png" alt="Guide Line" class="brand-left__guideline" />
          </a>
          <img src="/images/brand/도장 누끼-01.png" alt="Stamp" class="brand-left__stamp" />
        </div>

        <!-- Product Slider - 우측 끝에 배치 -->
        <div class="brand__slider">
          <div class="swiper brand-swiper">
            <div class="swiper-wrapper">
              <div class="swiper-slide">
                <div class="product-card">
                  <img src="/images/brand/1.png" alt="Bellement 제품 1" />
                </div>
              </div>
              <div class="swiper-slide">
                <div class="product-card">
                  <img src="/images/brand/2.png" alt="Bellement 제품 2" />
                </div>
              </div>
              <div class="swiper-slide">
                <div class="product-card">
                  <img src="/images/brand/3.png" alt="Bellement 제품 3" />
                </div>
              </div>
              <div class="swiper-slide">
                <div class="product-card">
                  <img src="/images/brand/4.png" alt="Bellement 제품 4" />
                </div>
              </div>
              <div class="swiper-slide">
                <div class="product-card">
                  <img src="/images/brand/5.png" alt="Bellement 제품 5" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 푸터 플레이스홀더 (components.js가 로드) -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js?v=20260112b"></script>
  </body>
</html>
