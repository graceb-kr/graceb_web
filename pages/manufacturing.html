<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Graceb - 최첨단 설비와 기술력. OEM/ODM 화장품 제조 전문."
    />
    <meta
      name="keywords"
      content="Graceb, 화장품 제조, OEM, ODM, 제조시설, 생산설비"
    />
    <title>Manufacturing - Graceb</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Manufacturing - Graceb" />
    <meta
      property="og:description"
      content="최첨단 설비와 기술력으로 프리미엄 화장품을 제조합니다."
    />
    <meta property="og:image" content="https://graceb-web.vercel.app/images/logo/OG_tag.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://graceb-web.vercel.app/pages/manufacturing.html" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/logo/favicon-96x96.png"
    />

    <!-- Fonts -->
    <link rel="stylesheet" href="https://use.typekit.net/xlc0hdn.css" />

    <!-- Swiper.js -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- AOS.js -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css?v=20260112b" />
  </head>
  <body class="page-body">
    <!-- 헤더 플레이스홀더 (components.js가 로드) -->
    <div id="header-placeholder"></div>

    <!-- ========== PAGE HERO ========== -->
    <section class="page-hero page-hero--simple">
      <div class="page-hero__background">
        <img src="/images/제품소개/제조 가능 품목 사진들/제작 가능 헤더.png" alt="Manufacturing" />
        <div class="page-hero__overlay"></div>
      </div>
      <div class="container">
        <div class="page-hero__content">
          <span class="page-hero__subtitle">Manufacturing Excellence</span>
          <h1 class="page-hero__title">최첨단 설비와 기술력</h1>
        </div>
      </div>
    </section>

    <!-- ========== MANUFACTURING CONTENT ========== -->
    <section class="page-section page-section--gray">
      <div class="container">
        <!-- Facility Gallery -->
        <div class="manufacturing__gallery" data-aos="fade-up">
          <div class="gallery-grid">
            <div class="gallery-item gallery-item--large">
              <img src="/images/facility/1.png" alt="제조 시설 1" />
            </div>
            <div class="gallery-item">
              <img src="/images/facility/2.png" alt="제조 시설 2" />
            </div>
            <div class="gallery-item">
              <img src="/images/facility/3.png" alt="제조 시설 3" />
            </div>
            <div class="gallery-item">
              <img src="/images/facility/4.png" alt="제조 시설 4" />
            </div>
            <div class="gallery-item">
              <img src="/images/facility/5.png" alt="제조 시설 5" />
            </div>
          </div>
        </div>

        <!-- Counter Stats -->
        <div class="manufacturing__stats">
          <div class="counter-card" data-aos="fade-up" data-aos-delay="0">
            <span class="counter-card__number" data-target="5000">0</span>
            <span class="counter-card__suffix">+</span>
            <span class="counter-card__label">연간 생산량</span>
          </div>
          <div class="counter-card" data-aos="fade-up" data-aos-delay="100">
            <span class="counter-card__number" data-target="20">0</span>
            <span class="counter-card__suffix">+</span>
            <span class="counter-card__label">제품 개발 사례</span>
          </div>
          <div class="counter-card" data-aos="fade-up" data-aos-delay="200">
            <span class="counter-card__number" data-target="6">0</span>
            <span class="counter-card__suffix">단계</span>
            <span class="counter-card__label">품질 관리 프로세스</span>
          </div>
        </div>

        <!-- OEM/ODM Services -->
        <div class="manufacturing__services" data-aos="fade-up">
          <div class="service-box">
            <h3 class="service-box__title">OEM 서비스</h3>
            <p class="service-box__description">
              고객사의 브랜드와 제품 사양에 맞춘 맞춤형 생산 서비스를
              제공합니다.
            </p>
          </div>
          <div class="service-box">
            <h3 class="service-box__title">ODM 서비스</h3>
            <p class="service-box__description">
              기획부터 생산까지 원스톱 솔루션으로 브랜드의 성공을 지원합니다.
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- 푸터 플레이스홀더 (components.js가 로드) -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/main.js?v=20260112b"></script>
  </body>
</html>
